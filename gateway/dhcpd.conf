# /etc/dhcp/dhcpd.conf
# ============================================================
# DHCP конфігурація для LAN інтерфейсу (enp7s0)
# Gateway: 192.168.100.2 (Debian)
# Діапазон клієнтів: 192.168.100.50 - 192.168.100.100
# ============================================================

default-lease-time 600;
max-lease-time 7200;

subnet 192.168.100.0 netmask 255.255.255.0 {
    range 192.168.100.50 192.168.100.100;

    # Default gateway — Debian Tor Gateway
    option routers 192.168.100.2;

    option subnet-mask 255.255.255.0;
    option broadcast-address 192.168.100.255;

    # Tor слухає на DNSPort 192.168.100.2:5353
    # iptables redirect порт 53 → 5353
    option domain-name-servers 192.168.100.2;
}
